name: Harness Android

concurrency:
  group: harness-android-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

on:
  workflow_dispatch:
    inputs:
      device_api_level:
        description: "Android API level for the emulator"
        required: false
        default: "36"
        type: string
      device_profile:
        description: "Device profile"
        required: false
        default: "pixel_7"
        type: string
      avd_name:
        description: "AVD name"
        required: false
        default: "Pixel_7_API_36"
        type: string
  push:
    branches:
      - main
    paths:
      - ".github/workflows/harness-android.yml"
      - "example/android/**"
      - "**/nitrogen/generated/shared/**"
      - "**/nitrogen/generated/android/**"
      - "packages/react-native-nitro-test/cpp/**"
      - "packages/react-native-nitro-test/android/**"
      - "packages/react-native-nitro-test-external/cpp/**"
      - "packages/react-native-nitro-test-external/android/**"
      - "packages/react-native-nitro-modules/cpp/**"
      - "packages/react-native-nitro-modules/android/**"
      - "packages/react-native-nitro-modules/src/**"
      - "**/bun.lock"
      - "**/react-native.config.js"
      - "**/nitro.json"
      - "example/__tests__/**"
      - "example/src/getTests.ts"
      - "example/src/testing/**"
      - "example/jest.harness.config.mjs"
      - "example/package.json"
      - "example/rn-harness.config.mjs"
  pull_request:
    paths:
      - ".github/workflows/harness-android.yml"
      - "example/android/**"
      - "**/nitrogen/generated/shared/**"
      - "**/nitrogen/generated/android/**"
      - "packages/react-native-nitro-test/cpp/**"
      - "packages/react-native-nitro-test/android/**"
      - "packages/react-native-nitro-test-external/cpp/**"
      - "packages/react-native-nitro-test-external/android/**"
      - "packages/react-native-nitro-modules/cpp/**"
      - "packages/react-native-nitro-modules/android/**"
      - "packages/react-native-nitro-modules/src/**"
      - "**/bun.lock"
      - "**/react-native.config.js"
      - "**/nitro.json"
      - "example/__tests__/**"
      - "example/src/getTests.ts"
      - "example/src/testing/**"
      - "example/jest.harness.config.mjs"
      - "example/package.json"
      - "example/rn-harness.config.mjs"

env:
  # Device configuration - can be overridden by workflow_dispatch inputs
  DEVICE_API_LEVEL: ${{ github.event.inputs.device_api_level || '36' }}
  DEVICE_ARCH: x86_64
  DEVICE_PROFILE: ${{ github.event.inputs.device_profile || 'pixel_7' }}
  AVD_NAME: ${{ github.event.inputs.avd_name || 'Pixel_7_API_36' }}
  AVD_DISK_SIZE: 1G
  AVD_HEAP_SIZE: 1G
  TSAN_OPTIONS: "halt_on_error=1"

jobs:
  harness_android_new:
    name: Harness Android (new architecture)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        min-sdk:
          - '26'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Reclaim disk space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: oven-sh/setup-bun@v2

      - name: Install npm dependencies (bun)
        run: bun install

      - name: Set minSdk in build.gradle
        run: sed -i "s/minSdkVersion = 24/minSdkVersion = ${{ matrix.min-sdk }}/g" example/android/build.gradle

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: 17
          java-package: jdk

      - name: Restore Gradle/CMake cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            example/android/.gradle
            example/android/app/.cxx
          key: ${{ runner.os }}-gradle-${{ matrix.min-sdk }}-${{ env.DEVICE_ARCH }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.min-sdk }}-${{ env.DEVICE_ARCH }}-
            ${{ runner.os }}-gradle-
      - name: Package ThreadSanitizer runtime
        working-directory: example/android
        run: |
          set -euo pipefail
          ndk_version="$(sed -n 's/.*ndkVersion = "\([^"]*\)".*/\1/p' build.gradle | head -1)"
          tsan_runtime="$(find "$ANDROID_HOME/ndk/${ndk_version}/toolchains/llvm/prebuilt" -path "*/lib/linux/libclang_rt.tsan-x86_64-android.so" -print -quit)"

          mkdir -p "app/src/debug/jniLibs/x86_64" "app/src/debug/resources/lib/x86_64"
          cp "$tsan_runtime" "app/src/debug/jniLibs/x86_64/"
          cat > "app/src/debug/resources/lib/x86_64/wrap.sh" <<EOF
          #!/system/bin/sh
          HERE="\$(cd "\$(dirname "\$0")" && pwd)"
          export TSAN_OPTIONS="\${TSAN_OPTIONS:-halt_on_error=1}"
          export LD_PRELOAD="\$HERE/libclang_rt.tsan-x86_64-android.so"
          "\$@"
          EOF
          chmod +x "app/src/debug/resources/lib/x86_64/wrap.sh"

      - name: Build Android app
        working-directory: example/android
        run: ./gradlew :app:assembleDebug --no-daemon --build-cache -PreactNativeArchitectures=${{ env.DEVICE_ARCH }}

      - name: Run Harness E2E tests
        # TODO: switch to @v1.3.0 once upstream publishes the GitHub Action tag.
        uses: callstackincubator/react-native-harness@v1.2.0
        with:
          runner: android
          projectRoot: example
          app: android/app/build/outputs/apk/debug/app-debug.apk
          packageManager: bun

      # Gradle cache doesn't like daemons
      - name: Stop Gradle Daemon
        working-directory: example/android
        run: ./gradlew --stop
