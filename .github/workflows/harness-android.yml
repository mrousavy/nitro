name: Harness Android

concurrency:
  group: harness-android-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

on:
  workflow_dispatch:
    inputs:
      device_api_level:
        description: "Android API level for the emulator"
        required: false
        default: "35"
        type: string
      device_profile:
        description: "Device profile"
        required: false
        default: "pixel_8"
        type: string
      avd_name:
        description: "AVD name"
        required: false
        default: "Pixel_8_API_35"
        type: string
  push:
    branches:
      - main
    paths:
      - ".github/workflows/harness-android.yml"
      - "example/android/**"
      - "**/nitrogen/generated/shared/**"
      - "**/nitrogen/generated/android/**"
      - "packages/react-native-nitro-test/cpp/**"
      - "packages/react-native-nitro-test/android/**"
      - "packages/react-native-nitro-test-external/cpp/**"
      - "packages/react-native-nitro-test-external/android/**"
      - "packages/react-native-nitro-modules/cpp/**"
      - "packages/react-native-nitro-modules/android/**"
      - "packages/react-native-nitro-modules/src/**"
      - "**/bun.lock"
      - "**/react-native.config.js"
      - "**/nitro.json"
      - "example/__tests__/**"
      - "example/src/getTests.ts"
      - "example/src/testing/**"
      - "example/jest.config.js"
      - "example/jest.harness.config.mjs"
      - "example/package.json"
      - "example/rn-harness.config.mjs"
  pull_request:
    paths:
      - ".github/workflows/harness-android.yml"
      - "example/android/**"
      - "**/nitrogen/generated/shared/**"
      - "**/nitrogen/generated/android/**"
      - "packages/react-native-nitro-test/cpp/**"
      - "packages/react-native-nitro-test/android/**"
      - "packages/react-native-nitro-test-external/cpp/**"
      - "packages/react-native-nitro-test-external/android/**"
      - "packages/react-native-nitro-modules/cpp/**"
      - "packages/react-native-nitro-modules/android/**"
      - "packages/react-native-nitro-modules/src/**"
      - "**/bun.lock"
      - "**/react-native.config.js"
      - "**/nitro.json"
      - "example/__tests__/**"
      - "example/src/getTests.ts"
      - "example/src/testing/**"
      - "example/jest.config.js"
      - "example/jest.harness.config.mjs"
      - "example/package.json"
      - "example/rn-harness.config.mjs"

env:
  # Device configuration - can be overridden by workflow_dispatch inputs
  DEVICE_API_LEVEL: ${{ github.event.inputs.device_api_level || '35' }}
  DEVICE_PROFILE: ${{ github.event.inputs.device_profile || 'pixel_8' }}
  AVD_NAME: ${{ github.event.inputs.avd_name || 'Pixel_8_API_35' }}

jobs:
  harness_android_new:
    name: Harness Android (new architecture)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        min-sdk:
          - '26'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Reclaim disk space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: oven-sh/setup-bun@v2

      - name: Install npm dependencies (bun)
        run: bun install

      - name: Set minSdk in build.gradle
        run: sed -i "s/minSdkVersion = 24/minSdkVersion = ${{ matrix.min-sdk }}/g" example/android/build.gradle

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: 17
          java-package: jdk

      - name: Restore Gradle/CMake cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            example/android/.gradle
            example/android/app/.cxx
          key: ${{ runner.os }}-gradle-${{ matrix.min-sdk }}-x86_64-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.min-sdk }}-x86_64-
            ${{ runner.os }}-gradle-
      - name: Build Android app
        working-directory: example/android
        run: ./gradlew :app:assembleDebug --no-daemon --build-cache -PreactNativeArchitectures=x86_64

      - name: Run Harness E2E tests
        uses: callstackincubator/react-native-harness@v1.2.0
        with:
          app: android/app/build/outputs/apk/debug/app-debug.apk
          runner: android
          projectRoot: example
          packageManager: bun
          cacheAvd: true

      # Gradle cache doesn't like daemons
      - name: Stop Gradle Daemon
        working-directory: example/android
        run: ./gradlew --stop
